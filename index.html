<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpeedRun - F1 Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Track definition: outer ellipse and inner ellipse (road between them)
// Center of the track in world space
const TRACK_CX = 0;
const TRACK_CY = 0;
const TRACK_RX_OUTER = 700;  // outer x-radius
const TRACK_RY_OUTER = 380;  // outer y-radius
const TRACK_WIDTH = 120;     // road width
const TRACK_RX_INNER = TRACK_RX_OUTER - TRACK_WIDTH;
const TRACK_RY_INNER = TRACK_RY_OUTER - TRACK_WIDTH;
const KERB_WIDTH = 18;

// Player car
const car = {
  x: TRACK_CX,
  y: -(TRACK_RY_OUTER - TRACK_WIDTH / 2), // top of track
  angle: 0,      // heading in radians, 0 = right
  vx: 0,         // world-space velocity x
  vy: 0,         // world-space velocity y
  angularVel: 0, // rotational velocity
  onTrack: true,
  width: 28,
  height: 14,
};

// Camera
const cam = { x: 0, y: 0 };

// Keys
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup',   e => keys[e.key] = false);

// Build ellipse path helper
function ellipsePath(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
}

// Draw track layers in world space (camera already applied via transform)
function drawTrack() {
  // Grass background (large green fill)
  ctx.fillStyle = '#3a8c3a';
  ctx.fillRect(-5000, -5000, 10000, 10000);

  // Infield grass (inside inner ellipse)
  ellipsePath(TRACK_CX, TRACK_CY, TRACK_RX_INNER - KERB_WIDTH, TRACK_RY_INNER - KERB_WIDTH);
  ctx.fillStyle = '#3a8c3a';
  ctx.fill();

  // Outer kerb (red/white striped ring)
  drawKerb(TRACK_RX_OUTER, TRACK_RY_OUTER, KERB_WIDTH, true);

  // Inner kerb
  drawKerb(TRACK_RX_INNER, TRACK_RY_INNER, KERB_WIDTH, false);

  // Road (asphalt)
  ellipsePath(TRACK_CX, TRACK_CY, TRACK_RX_OUTER - KERB_WIDTH, TRACK_RY_OUTER - KERB_WIDTH);
  ctx.fillStyle = '#555';
  ctx.fill();
  ellipsePath(TRACK_CX, TRACK_CY, TRACK_RX_INNER + KERB_WIDTH, TRACK_RY_INNER + KERB_WIDTH);
  ctx.fillStyle = '#3a8c3a';
  ctx.fill();

  // Start/finish line
  ctx.save();
  ctx.fillStyle = '#fff';
  const sfX = TRACK_CX;
  const sfY = -(TRACK_RY_OUTER - KERB_WIDTH);
  const sfH = TRACK_WIDTH - KERB_WIDTH * 2;
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#fff' : '#000';
    ctx.fillRect(sfX - 8, sfY + (sfH / 6) * i, 16, sfH / 6);
  }
  ctx.restore();
}

// Draw a kerb ring (alternating red/white segments)
function drawKerb(rx, ry, w, outer) {
  const segments = 40;
  for (let i = 0; i < segments; i++) {
    const a1 = (i / segments) * Math.PI * 2;
    const a2 = ((i + 1) / segments) * Math.PI * 2;
    ctx.beginPath();
    if (outer) {
      ctx.ellipse(TRACK_CX, TRACK_CY, rx, ry, 0, a1, a2);
      ctx.ellipse(TRACK_CX, TRACK_CY, rx - w, ry - w, 0, a2, a1, true);
    } else {
      ctx.ellipse(TRACK_CX, TRACK_CY, rx + w, ry + w, 0, a1, a2);
      ctx.ellipse(TRACK_CX, TRACK_CY, rx, ry, 0, a2, a1, true);
    }
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? '#e00' : '#fff';
    ctx.fill();
  }
}

function drawCar() {
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  const w = car.width;
  const h = car.height;

  // Car body
  ctx.fillStyle = '#e10600'; // F1 red
  ctx.beginPath();
  ctx.moveTo(w / 2, 0);
  ctx.lineTo(w / 4, -h / 2);
  ctx.lineTo(-w / 2, -h / 2);
  ctx.lineTo(-w / 2, h / 2);
  ctx.lineTo(w / 4, h / 2);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#111';
  ctx.fillRect(-2, -h / 4, w / 3, h / 2);

  // Front wing
  ctx.fillStyle = '#ccc';
  ctx.fillRect(w / 2 - 2, -h / 2 - 3, 6, h + 6);

  // Rear wing
  ctx.fillStyle = '#ccc';
  ctx.fillRect(-w / 2 - 4, -h / 2 - 4, 6, h + 8);

  ctx.restore();
}

// Physics constants
const ACCEL          = 0.28;   // acceleration force per frame
const BRAKE_FORCE    = 0.45;   // braking deceleration per frame
const MAX_SPEED_ROAD = 8.5;    // max speed on road
const MAX_SPEED_GRASS= 3.5;    // max speed on grass
const FRICTION_ROAD  = 0.987;  // longitudinal drag on road
const FRICTION_GRASS = 0.93;   // heavy drag on grass
const GRIP_ROAD      = 0.85;   // lateral velocity retained on road (lower = more grip)
const GRIP_GRASS     = 0.65;   // less grip on grass (more sliding)
const TURN_ACCEL     = 0.003;  // angular acceleration per frame
const TURN_MAX       = 0.048;  // max angular velocity
const ANGULAR_DAMP   = 0.80;   // angular velocity damping when not steering

// Returns true if world point (x,y) is on the asphalt (between inner and outer ellipses)
function isOnTrack(x, y) {
  const outerNorm = (x / TRACK_RX_OUTER) ** 2 + (y / TRACK_RY_OUTER) ** 2;
  const innerNorm = (x / TRACK_RX_INNER) ** 2 + (y / TRACK_RY_INNER) ** 2;
  return outerNorm <= 1 && innerNorm >= 1;
}

function update() {
  const up    = keys['w'] || keys['W'] || keys['ArrowUp'];
  const down  = keys['s'] || keys['S'] || keys['ArrowDown'];
  const left  = keys['a'] || keys['A'] || keys['ArrowLeft'];
  const right = keys['d'] || keys['D'] || keys['ArrowRight'];

  car.onTrack = isOnTrack(car.x, car.y);

  const maxSpeed = car.onTrack ? MAX_SPEED_ROAD : MAX_SPEED_GRASS;
  const friction = car.onTrack ? FRICTION_ROAD  : FRICTION_GRASS;
  const grip     = car.onTrack ? GRIP_ROAD      : GRIP_GRASS;

  // Current speed (signed, along heading)
  const headX  = Math.cos(car.angle);
  const headY  = Math.sin(car.angle);
  const fwdSpd = car.vx * headX + car.vy * headY;

  // Angular velocity steering — scales with forward speed for realistic feel
  const speedNorm = Math.min(Math.abs(fwdSpd) / 2, 1);
  if (left)  car.angularVel = Math.max(car.angularVel - TURN_ACCEL, -TURN_MAX);
  if (right) car.angularVel = Math.min(car.angularVel + TURN_ACCEL,  TURN_MAX);
  if (!left && !right) car.angularVel *= ANGULAR_DAMP;
  car.angularVel *= 0.88; // always damp slightly
  car.angle += car.angularVel * speedNorm;

  // Acceleration along heading
  if (up && fwdSpd < maxSpeed) {
    const push = Math.min(ACCEL, maxSpeed - fwdSpd);
    car.vx += headX * push;
    car.vy += headY * push;
  }

  // Braking / reverse
  if (down) {
    if (fwdSpd > 0.1) {
      // Braking while moving forward
      car.vx -= headX * BRAKE_FORCE;
      car.vy -= headY * BRAKE_FORCE;
    } else if (fwdSpd > -(maxSpeed * 0.4)) {
      // Reverse
      car.vx += headX * (-ACCEL * 0.6);
      car.vy += headY * (-ACCEL * 0.6);
    }
  }

  // Grip: reduce lateral (sideways) velocity — velocity gradually aligns to heading
  const latX    = -headY;
  const latY    =  headX;
  const latSpd  = car.vx * latX + car.vy * latY;
  car.vx -= latX * latSpd * (1 - grip);
  car.vy -= latY * latSpd * (1 - grip);

  // Longitudinal friction (drag)
  car.vx *= friction;
  car.vy *= friction;

  // Clamp to max speed
  const curSpd = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
  if (curSpd > maxSpeed) {
    car.vx = (car.vx / curSpd) * maxSpeed;
    car.vy = (car.vy / curSpd) * maxSpeed;
  }

  car.x += car.vx;
  car.y += car.vy;

  // Camera smoothly follows car
  cam.x += (car.x - cam.x) * 0.1;
  cam.y += (car.y - cam.y) * 0.1;
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  // Center camera
  ctx.translate(canvas.width / 2 - cam.x, canvas.height / 2 - cam.y);

  drawTrack();
  drawCar();

  ctx.restore();

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, 10, 160, 36);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  const dispSpd = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
  ctx.fillText(`Speed: ${(dispSpd * 60).toFixed(0)} km/h  ${car.onTrack ? '' : '[GRASS]'}`, 20, 32);
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

loop();
</script>
</body>
</html>
