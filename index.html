<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpeedRun - F1 Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Track definition: outer ellipse and inner ellipse (road between them)
const TRACK_CX = 0;
const TRACK_CY = 0;
const TRACK_RX_OUTER = 700;
const TRACK_RY_OUTER = 380;
const TRACK_WIDTH = 120;
const TRACK_RX_INNER = TRACK_RX_OUTER - TRACK_WIDTH;
const TRACK_RY_INNER = TRACK_RY_OUTER - TRACK_WIDTH;
const KERB_WIDTH = 18;

// Player car
const car = {
  x: TRACK_CX,
  y: -(TRACK_RY_OUTER - TRACK_WIDTH / 2),
  angle: 0,
  vx: 0,
  vy: 0,
  angularVel: 0,
  onTrack: true,
  width: 28,
  height: 14,
  drifting: false,
  driftBoostTimer: 0,
};

// Camera
const cam = { x: 0, y: 0, angle: 0 };
let cameraMode = 'follow'; // 'god' | 'follow'

// Game state
let gameState = 'countdown'; // 'countdown' | 'racing' | 'finished'
let countdownStart = performance.now();

// Keys
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault(); // prevent page scroll
  if (e.key === 'r' || e.key === 'R') restartGame();
  if (e.key === 'v' || e.key === 'V') cameraMode = cameraMode === 'follow' ? 'god' : 'follow';
});
document.addEventListener('keyup', e => keys[e.key] = false);

// Tire marks: { x, y, alpha }
const tireMarks = [];
const TIRE_MARK_LIFE = 120; // frames until fully faded (~2s at 60fps)

// Speed particles: { x, y, alpha, life }
const particles = [];

// Lap system
const RX_MID = (TRACK_RX_OUTER + TRACK_RX_INNER) / 2; // 640
const RY_MID = (TRACK_RY_OUTER + TRACK_RY_INNER) / 2; // 320
const CHECKPOINT_RADIUS = 75;
const SF_ANGLE = -Math.PI / 2; // start/finish line angle on ellipse (top)

function cpPos(t) {
  return { x: RX_MID * Math.cos(t), y: RY_MID * Math.sin(t) };
}

// 7 checkpoints in clockwise order starting just after the start/finish line (top of track)
const CHECKPOINTS = [
  cpPos(-Math.PI / 4),      // upper-right
  cpPos(0),                 // right
  cpPos(Math.PI / 4),       // lower-right
  cpPos(Math.PI / 2),       // bottom
  cpPos(3 * Math.PI / 4),   // lower-left
  cpPos(Math.PI),           // left
  cpPos(-3 * Math.PI / 4),  // upper-left
];

// AI opponents
const aiCars = [
  { color: '#2060ff', angularSpeed: 0.008, t: 0,               accumulated: 0, laps: 0, x: 0, y: 0, angle: 0, width: 28, height: 14, drifting: false, driftBoostTimer: 0 },
  { color: '#ff8800', angularSpeed: 0.009, t: Math.PI * 2 / 3, accumulated: 0, laps: 0, x: 0, y: 0, angle: 0, width: 28, height: 14, drifting: false, driftBoostTimer: 0 },
  { color: '#00cc44', angularSpeed: 0.010, t: Math.PI * 4 / 3, accumulated: 0, laps: 0, x: 0, y: 0, angle: 0, width: 28, height: 14, drifting: false, driftBoostTimer: 0 },
];
// Pre-compute how far each AI starts from the SF line (so lap count is relative to SF crossings)
for (const ai of aiCars) {
  ai.initialOffset = ((ai.t - SF_ANGLE) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
}

const lapState = {
  lap: 1,
  maxLaps: 3,
  checkpointsMet: new Array(CHECKPOINTS.length).fill(false),
  raceStartTime: 0,
  lapStartTime: 0,
  currentLapTime: 0,
  bestLapTime: null,
  finished: false,
  totalTime: 0,
  prevCarX: 0,
};

function formatTime(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${m}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
}

function updateLapSystem() {
  if (lapState.finished) return;

  const now = performance.now();
  lapState.currentLapTime = now - lapState.lapStartTime;

  // Check proximity to each checkpoint in order
  for (let i = 0; i < CHECKPOINTS.length; i++) {
    if (!lapState.checkpointsMet[i]) {
      const cp = CHECKPOINTS[i];
      const dx = car.x - cp.x;
      const dy = car.y - cp.y;
      if (dx * dx + dy * dy < CHECKPOINT_RADIUS * CHECKPOINT_RADIUS) {
        lapState.checkpointsMet[i] = true;
      }
      break; // must hit in order — stop at first unmet
    }
  }

  // Start/finish crossing: car crosses x=0 left→right in the upper track region
  const prevX = lapState.prevCarX;
  if (prevX < 0 && car.x >= 0 && car.y < -250 && car.y > -420) {
    if (lapState.checkpointsMet.every(v => v)) {
      const lapTime = lapState.currentLapTime;
      if (lapState.bestLapTime === null || lapTime < lapState.bestLapTime) {
        lapState.bestLapTime = lapTime;
      }
      if (lapState.lap >= lapState.maxLaps) {
        lapState.finished = true;
        gameState = 'finished';
        lapState.totalTime = now - lapState.raceStartTime;
      } else {
        lapState.lap++;
        lapState.checkpointsMet.fill(false);
        lapState.lapStartTime = now;
      }
    }
  }

  lapState.prevCarX = car.x;
}

function updateAI() {
  for (const ai of aiCars) {
    ai.t += ai.angularSpeed;
    ai.accumulated += ai.angularSpeed;

    const distFromSF = ai.initialOffset + ai.accumulated;
    ai.laps = Math.floor(distFromSF / (Math.PI * 2));

    ai.x = RX_MID * Math.cos(ai.t);
    ai.y = RY_MID * Math.sin(ai.t);
    // Tangent to ellipse: d/dt(RX_MID*cos t, RY_MID*sin t) = (-RX_MID*sin t, RY_MID*cos t)
    ai.angle = Math.atan2(RY_MID * Math.cos(ai.t), -RX_MID * Math.sin(ai.t));
  }
}

// Ranking: total laps-equivalent progress from SF line (higher = further ahead)
function aiRaceScore(ai) {
  return (ai.initialOffset + ai.accumulated) / (Math.PI * 2);
}

function playerRaceScore() {
  const rawAngle = Math.atan2(car.y / RY_MID, car.x / RX_MID);
  const progressInLap = ((rawAngle - SF_ANGLE) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) / (Math.PI * 2);
  return (lapState.lap - 1) + progressInLap;
}

function getPlayerRank() {
  const playerScore = playerRaceScore();
  let rank = 1;
  for (const ai of aiCars) {
    if (aiRaceScore(ai) > playerScore) rank++;
  }
  return rank;
}

// Build ellipse path helper
function ellipsePath(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
}

function drawTrack() {
  // Grass background
  ctx.fillStyle = '#3a8c3a';
  ctx.fillRect(-5000, -5000, 10000, 10000);

  // Infield grass
  ellipsePath(TRACK_CX, TRACK_CY, TRACK_RX_INNER - KERB_WIDTH, TRACK_RY_INNER - KERB_WIDTH);
  ctx.fillStyle = '#3a8c3a';
  ctx.fill();

  // Outer kerb
  drawKerb(TRACK_RX_OUTER, TRACK_RY_OUTER, KERB_WIDTH, true);

  // Inner kerb
  drawKerb(TRACK_RX_INNER, TRACK_RY_INNER, KERB_WIDTH, false);

  // Road (asphalt)
  ellipsePath(TRACK_CX, TRACK_CY, TRACK_RX_OUTER - KERB_WIDTH, TRACK_RY_OUTER - KERB_WIDTH);
  ctx.fillStyle = '#555';
  ctx.fill();
  ellipsePath(TRACK_CX, TRACK_CY, TRACK_RX_INNER + KERB_WIDTH, TRACK_RY_INNER + KERB_WIDTH);
  ctx.fillStyle = '#3a8c3a';
  ctx.fill();

  // Start/finish line
  ctx.save();
  const sfX = TRACK_CX;
  const sfY = -(TRACK_RY_OUTER - KERB_WIDTH);
  const sfH = TRACK_WIDTH - KERB_WIDTH * 2;
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#fff' : '#000';
    ctx.fillRect(sfX - 8, sfY + (sfH / 6) * i, 16, sfH / 6);
  }
  ctx.restore();
}

function drawKerb(rx, ry, w, outer) {
  const segments = 40;
  for (let i = 0; i < segments; i++) {
    const a1 = (i / segments) * Math.PI * 2;
    const a2 = ((i + 1) / segments) * Math.PI * 2;
    ctx.beginPath();
    if (outer) {
      ctx.ellipse(TRACK_CX, TRACK_CY, rx, ry, 0, a1, a2);
      ctx.ellipse(TRACK_CX, TRACK_CY, rx - w, ry - w, 0, a2, a1, true);
    } else {
      ctx.ellipse(TRACK_CX, TRACK_CY, rx + w, ry + w, 0, a1, a2);
      ctx.ellipse(TRACK_CX, TRACK_CY, rx, ry, 0, a2, a1, true);
    }
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? '#e00' : '#fff';
    ctx.fill();
  }
}

function drawTireMarks() {
  for (const m of tireMarks) {
    ctx.beginPath();
    ctx.arc(m.x, m.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(10,10,10,${m.alpha * 0.8})`;
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
    ctx.fill();
  }
}

function drawMinimap() {
  const mx = canvas.width - 160;
  const my = 130;
  const mw = 150;
  const mh = 100;
  const scale = 0.095;
  const cx = mx + mw / 2;
  const cy = my + mh / 2;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(mx, my, mw, mh);

  ctx.save();
  ctx.beginPath();
  ctx.rect(mx, my, mw, mh);
  ctx.clip();

  // Track fill (even-odd to punch out inner ellipse)
  ctx.beginPath();
  ctx.ellipse(cx, cy, TRACK_RX_OUTER * scale, TRACK_RY_OUTER * scale, 0, 0, Math.PI * 2);
  ctx.ellipse(cx, cy, TRACK_RX_INNER * scale, TRACK_RY_INNER * scale, 0, 0, Math.PI * 2, true);
  ctx.fillStyle = 'rgba(120,120,120,0.6)';
  ctx.fill('evenodd');

  // Track outline strokes
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, TRACK_RX_OUTER * scale, TRACK_RY_OUTER * scale, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy, TRACK_RX_INNER * scale, TRACK_RY_INNER * scale, 0, 0, Math.PI * 2);
  ctx.stroke();

  // AI car dots
  for (const ai of aiCars) {
    ctx.beginPath();
    ctx.arc(cx + ai.x * scale, cy + ai.y * scale, 3, 0, Math.PI * 2);
    ctx.fillStyle = ai.color;
    ctx.fill();
  }

  // Player dot (slightly larger, white outline)
  ctx.beginPath();
  ctx.arc(cx + car.x * scale, cy + car.y * scale, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#e10600';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();

  // Border
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, mw, mh);
}

function drawCar(carObj, bodyColor) {
  ctx.save();
  ctx.translate(carObj.x, carObj.y);
  ctx.rotate(carObj.angle);

  const w = carObj.width;
  const h = carObj.height;

  // Car body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.moveTo(w / 2, 0);
  ctx.lineTo(w / 4, -h / 2);
  ctx.lineTo(-w / 2, -h / 2);
  ctx.lineTo(-w / 2, h / 2);
  ctx.lineTo(w / 4, h / 2);
  ctx.closePath();
  ctx.fill();

  // Drift/boost outline
  if (carObj.drifting) {
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  } else if (carObj.driftBoostTimer > 0) {
    ctx.strokeStyle = '#0cf';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Cockpit
  ctx.fillStyle = '#111';
  ctx.fillRect(-2, -h / 4, w / 3, h / 2);

  // Front wing
  ctx.fillStyle = '#ccc';
  ctx.fillRect(w / 2 - 2, -h / 2 - 3, 6, h + 6);

  // Rear wing
  ctx.fillStyle = '#ccc';
  ctx.fillRect(-w / 2 - 4, -h / 2 - 4, 6, h + 8);

  ctx.restore();
}

// Physics constants
const ACCEL           = 0.28;
const BRAKE_FORCE     = 0.45;
const MAX_SPEED_ROAD  = 8.5;
const MAX_SPEED_GRASS = 3.5;
const FRICTION_ROAD   = 0.987;
const FRICTION_GRASS  = 0.93;
const GRIP_ROAD       = 0.85;   // lateral velocity retained (lower = more grip)
const GRIP_GRASS      = 0.65;
const GRIP_DRIFT      = 0.982;  // very low correction = significant sideways slide
const TURN_ACCEL      = 0.003;
const TURN_MAX        = 0.048;
const TURN_ACCEL_DRIFT = 0.006; // sharper steering during drift
const TURN_MAX_DRIFT   = 0.068;
const ANGULAR_DAMP    = 0.80;
const BOOST_DURATION  = 90;     // frames (1.5s at 60fps)
const BOOST_ACCEL     = 0.22;   // auto-push during boost
const BOOST_MAX_SPEED = MAX_SPEED_ROAD * 1.3;

function isOnTrack(x, y) {
  const outerNorm = (x / TRACK_RX_OUTER) ** 2 + (y / TRACK_RY_OUTER) ** 2;
  const innerNorm = (x / TRACK_RX_INNER) ** 2 + (y / TRACK_RY_INNER) ** 2;
  return outerNorm <= 1 && innerNorm >= 1;
}

function restartGame() {
  // Reset player car
  car.x = TRACK_CX;
  car.y = -(TRACK_RY_OUTER - TRACK_WIDTH / 2);
  car.angle = 0;
  car.vx = 0;
  car.vy = 0;
  car.angularVel = 0;
  car.onTrack = true;
  car.drifting = false;
  car.driftBoostTimer = 0;

  // Reset camera
  cam.x = car.x;
  cam.y = car.y;
  cam.angle = car.angle;

  // Reset tire marks
  tireMarks.length = 0;
  particles.length = 0;

  // Reset lap state
  lapState.lap = 1;
  lapState.checkpointsMet.fill(false);
  lapState.raceStartTime = 0;
  lapState.lapStartTime = 0;
  lapState.currentLapTime = 0;
  lapState.bestLapTime = null;
  lapState.finished = false;
  lapState.totalTime = 0;
  lapState.prevCarX = 0;

  // Reset AI
  const aiDefaults = [
    { angularSpeed: 0.008, t: 0 },
    { angularSpeed: 0.009, t: Math.PI * 2 / 3 },
    { angularSpeed: 0.010, t: Math.PI * 4 / 3 },
  ];
  for (let i = 0; i < aiCars.length; i++) {
    aiCars[i].t = aiDefaults[i].t;
    aiCars[i].accumulated = 0;
    aiCars[i].laps = 0;
    aiCars[i].angularSpeed = aiDefaults[i].angularSpeed;
    aiCars[i].drifting = false;
    aiCars[i].driftBoostTimer = 0;
    aiCars[i].initialOffset = ((aiCars[i].t - SF_ANGLE) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
    aiCars[i].x = RX_MID * Math.cos(aiCars[i].t);
    aiCars[i].y = RY_MID * Math.sin(aiCars[i].t);
  }

  // Start countdown
  gameState = 'countdown';
  countdownStart = performance.now();
}

function lerpCamAngle(t) {
  let diff = car.angle - cam.angle;
  // Normalize to [-PI, PI] to always take the short arc
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  cam.angle += diff * t;
}

function update() {
  // Handle countdown phase
  if (gameState === 'countdown') {
    const elapsed = performance.now() - countdownStart;
    if (elapsed >= 3700) {
      gameState = 'racing';
      const now = performance.now();
      lapState.raceStartTime = now;
      lapState.lapStartTime = now;
    }
    // Fade camera to car start position during countdown
    cam.x += (car.x - cam.x) * 0.1;
    cam.y += (car.y - cam.y) * 0.1;
    lerpCamAngle(0.1);
    return;
  }

  if (gameState === 'finished') return;

  const up    = keys['w'] || keys['W'] || keys['ArrowUp'];
  const down  = keys['s'] || keys['S'] || keys['ArrowDown'];
  const left  = keys['a'] || keys['A'] || keys['ArrowLeft'];
  const right = keys['d'] || keys['D'] || keys['ArrowRight'];
  const driftKey = keys[' '] || keys['Shift'];

  car.onTrack = isOnTrack(car.x, car.y);

  const maxSpeed = car.onTrack ? MAX_SPEED_ROAD : MAX_SPEED_GRASS;
  const friction = car.onTrack ? FRICTION_ROAD  : FRICTION_GRASS;

  const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
  const headX = Math.cos(car.angle);
  const headY = Math.sin(car.angle);
  const fwdSpd = car.vx * headX + car.vy * headY;

  // Drift: requires drift key + steering + enough speed + on track
  const wasDrifting = car.drifting;
  car.drifting = !!(driftKey && (left || right) && speed > 2 && car.onTrack);

  // Trigger boost when drift ends
  if (wasDrifting && !car.drifting) {
    car.driftBoostTimer = BOOST_DURATION;
  }
  const boostActive = car.driftBoostTimer > 0;
  if (boostActive) car.driftBoostTimer--;

  // Effective max speed (boost raises the ceiling)
  const effectiveMaxSpeed = boostActive ? BOOST_MAX_SPEED : maxSpeed;

  // Steering — wider envelope during drift
  const turnAccel = car.drifting ? TURN_ACCEL_DRIFT : TURN_ACCEL;
  const turnMax   = car.drifting ? TURN_MAX_DRIFT   : TURN_MAX;
  const speedNorm = Math.min(Math.abs(fwdSpd) / 2, 1);
  if (left)  car.angularVel = Math.max(car.angularVel - turnAccel, -turnMax);
  if (right) car.angularVel = Math.min(car.angularVel + turnAccel,  turnMax);
  if (!left && !right) car.angularVel *= ANGULAR_DAMP;
  car.angularVel *= 0.88;
  car.angle += car.angularVel * speedNorm;

  // Acceleration
  if (up && fwdSpd < effectiveMaxSpeed) {
    const push = Math.min(ACCEL, effectiveMaxSpeed - fwdSpd);
    car.vx += headX * push;
    car.vy += headY * push;
  }

  // Auto-push during boost (even without W)
  if (boostActive && fwdSpd > 0 && fwdSpd < effectiveMaxSpeed) {
    car.vx += headX * BOOST_ACCEL;
    car.vy += headY * BOOST_ACCEL;
  }

  // Braking / reverse
  if (down) {
    if (fwdSpd > 0.1) {
      car.vx -= headX * BRAKE_FORCE;
      car.vy -= headY * BRAKE_FORCE;
    } else if (fwdSpd > -(maxSpeed * 0.4)) {
      car.vx += headX * (-ACCEL * 0.6);
      car.vy += headY * (-ACCEL * 0.6);
    }
  }

  // Lateral grip — drift suppresses correction for sideways sliding
  const grip   = car.drifting ? GRIP_DRIFT : (car.onTrack ? GRIP_ROAD : GRIP_GRASS);
  const latX   = -headY;
  const latY   =  headX;
  const latSpd = car.vx * latX + car.vy * latY;
  car.vx -= latX * latSpd * (1 - grip);
  car.vy -= latY * latSpd * (1 - grip);

  // Longitudinal friction
  car.vx *= friction;
  car.vy *= friction;

  // Clamp to effective max speed
  const curSpd = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
  if (curSpd > effectiveMaxSpeed) {
    car.vx = (car.vx / curSpd) * effectiveMaxSpeed;
    car.vy = (car.vy / curSpd) * effectiveMaxSpeed;
  }

  car.x += car.vx;
  car.y += car.vy;

  // Tire marks: record rear-wheel positions during drift
  if (car.drifting) {
    const cosA = Math.cos(car.angle);
    const sinA = Math.sin(car.angle);
    const rearX = car.x - cosA * (car.width * 0.45);
    const rearY = car.y - sinA * (car.width * 0.45);
    const offX  = sinA * (car.height * 0.38);
    const offY  = cosA * (car.height * 0.38);
    tireMarks.push({ x: rearX - offX, y: rearY + offY, alpha: 1 });
    tireMarks.push({ x: rearX + offX, y: rearY - offY, alpha: 1 });
  }

  // Fade tire marks
  for (let i = tireMarks.length - 1; i >= 0; i--) {
    tireMarks[i].alpha -= 1 / TIRE_MARK_LIFE;
    if (tireMarks[i].alpha <= 0) tireMarks.splice(i, 1);
  }

  // Speed particles: spawn behind car when fast
  if (speed > 5) {
    const cosA = Math.cos(car.angle);
    const sinA = Math.sin(car.angle);
    const rearX = car.x - cosA * (car.width * 0.5);
    const rearY = car.y - sinA * (car.width * 0.5);
    const life = 15 + Math.random() * 15;
    particles.push({
      x: rearX + (Math.random() - 0.5) * 8,
      y: rearY + (Math.random() - 0.5) * 8,
      alpha: 0.5 + Math.random() * 0.3,
      life,
    });
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].alpha -= 1 / particles[i].life;
    if (particles[i].alpha <= 0) particles.splice(i, 1);
  }

  // Camera smoothly follows car
  cam.x += (car.x - cam.x) * 0.1;
  cam.y += (car.y - cam.y) * 0.1;
  lerpCamAngle(0.12);

  updateLapSystem();
  updateAI();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  if (cameraMode === 'follow') {
    // Place car at bottom-center; rotate so car heading points up
    ctx.translate(canvas.width / 2, canvas.height * 0.70);
    ctx.rotate(-cam.angle - Math.PI / 2);
    ctx.translate(-cam.x, -cam.y);
  } else {
    ctx.translate(canvas.width / 2 - cam.x, canvas.height / 2 - cam.y);
  }

  drawTrack();
  drawTireMarks();
  drawParticles();
  for (const ai of aiCars) drawCar(ai, ai.color);
  drawCar(car, '#e10600');

  ctx.restore();

  drawMinimap();

  // Camera mode toggle indicator
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, 76, 220, 22);
  ctx.font = '12px monospace';
  ctx.fillStyle = cameraMode === 'follow' ? '#0cf' : '#aaa';
  ctx.fillText(`[V] ${cameraMode === 'follow' ? 'Follow Cam' : 'God View'}`, 18, 91);

  // HUD — speed + position
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, 10, 220, 60);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  const dispSpd = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
  ctx.fillText(`Speed: ${(dispSpd * 60).toFixed(0)} km/h  ${car.onTrack ? '' : '[GRASS]'}`, 20, 32);
  const rank = getPlayerRank();
  const rankColors = ['#ffd700', '#c0c0c0', '#cd7f32', '#fff'];
  ctx.fillStyle = rankColors[rank - 1] || '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(`P${rank}/4`, 20, 58);

  // HUD — lap info (top-right area)
  const lapX = canvas.width - 240;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(lapX, 10, 230, 90);

  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(`LAP ${lapState.lap}/${lapState.maxLaps}`, lapX + 12, 38);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(`Current: ${formatTime(lapState.currentLapTime)}`, lapX + 12, 60);
  const bestStr = lapState.bestLapTime !== null ? formatTime(lapState.bestLapTime) : '--:--.--';
  ctx.fillText(`Best:    ${bestStr}`, lapX + 12, 80);

  // Checkpoint progress dots
  const dotY = 96;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(lapX, dotY, 230, 22);
  for (let i = 0; i < CHECKPOINTS.length; i++) {
    const dx = lapX + 12 + i * 30;
    ctx.beginPath();
    ctx.arc(dx, dotY + 11, 8, 0, Math.PI * 2);
    ctx.fillStyle = lapState.checkpointsMet[i] ? '#0f0' : '#444';
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // FINISHED overlay
  if (lapState.finished) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 72px monospace';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 30;
    ctx.fillText('FINISHED!', canvas.width / 2, canvas.height / 2 - 40);

    ctx.font = 'bold 28px monospace';
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.fillText(`Total: ${formatTime(lapState.totalTime)}`, canvas.width / 2, canvas.height / 2 + 20);
    const bestFin = lapState.bestLapTime !== null ? formatTime(lapState.bestLapTime) : '--:--.--';
    ctx.fillText(`Best Lap: ${bestFin}`, canvas.width / 2, canvas.height / 2 + 60);
    ctx.font = '18px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 110);
    ctx.restore();
    return;
  }

  // Countdown overlay
  if (gameState === 'countdown') {
    const elapsed = performance.now() - countdownStart;
    let text, color;
    if (elapsed < 1000)      { text = '3'; color = '#ffffff'; }
    else if (elapsed < 2000) { text = '2'; color = '#ff8800'; }
    else if (elapsed < 3000) { text = '1'; color = '#e10600'; }
    else                     { text = 'GO!'; color = '#00ff44'; }

    // Pulse scale: 1→1.3 over each 1s window
    const phase = elapsed % 1000;
    const scale = 1.3 - (phase / 1000) * 0.3;

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.font = `bold ${Math.round(120 * scale)}px monospace`;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillText(text, cx + 4, cy + 4);
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 40;
    ctx.fillText(text, cx, cy);
    ctx.restore();
    return;
  }

  // Drift / boost status text
  if (car.drifting) {
    ctx.save();
    ctx.font = 'bold 28px monospace';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 12;
    ctx.fillText('DRIFT', canvas.width / 2 - 44, canvas.height - 40);
    ctx.restore();
  } else if (car.driftBoostTimer > 0) {
    const alpha = car.driftBoostTimer / BOOST_DURATION;
    ctx.save();
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = `rgba(0,220,255,${alpha})`;
    ctx.shadowColor = '#0cf';
    ctx.shadowBlur = 10;
    ctx.fillText('BOOST!', canvas.width / 2 - 42, canvas.height - 40);
    ctx.restore();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

loop();
</script>
</body>
</html>
